- case: formset_factory_extended
  main: |
    from typing import Any
    from django import forms
    MyFormSet = forms.formset_factory(forms.Form)
    class CustomFormSet(MyFormSet):
      def clean(self) -> None:
        super().clean()
    fs = CustomFormSet()
    reveal_type(fs)  # N: Revealed type is "main.CustomFormSet"

