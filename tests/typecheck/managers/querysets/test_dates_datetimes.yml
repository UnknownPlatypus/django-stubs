-   case: dates_valid
    installed_apps:
        - myapp
    main: |
        from myapp.models import Article

        # DateField — valid for dates()
        Article.objects.dates("pub_date", "month")
        Article.objects.dates("pub_date", "year")
        Article.objects.dates("pub_date", "week")
        Article.objects.dates("pub_date", "day")

        # DateTimeField — valid for dates()
        Article.objects.dates("pub_datetime", "month")

        # Non-literal field_name (skipped)
        field: str = "pub_date"
        Article.objects.dates(field, "month")
    files:
        -   path: myapp/__init__.py
        -   path: myapp/models.py
            content: |
                from django.db import models

                class Article(models.Model):
                    title = models.CharField(max_length=200)
                    pub_date = models.DateField(null=True)
                    pub_datetime = models.DateTimeField(null=True)
                    count = models.IntegerField(default=0)


-   case: dates_invalid
    installed_apps:
        - myapp
    main: |
        from myapp.models import Article

        # IntegerField — not a date field
        Article.objects.dates("count", "month")  # E: 'count' isn't a DateField, TimeField, or DateTimeField.  [misc]

        # Non-existent field
        Article.objects.dates("nonexistent", "month")  # E: Article has no field named 'nonexistent'  [misc]

        # CharField — not a date field
        Article.objects.dates("title", "month")  # E: 'title' isn't a DateField, TimeField, or DateTimeField.  [misc]
